on:
  push:
    paths:
      - '**/*.puml'

name: Render PlantUML diagrams
jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure rendered directory
        run: mkdir -p rendered

      - name: Render .puml -> .svg using plantuml Docker image
        # runs plantuml inside the container with the repo mounted
        run: |
          # run a container that executes plantuml for all .puml files
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            plantuml/plantuml:jetty \
            sh -c 'find . -type f -name "*.puml" -print0 | xargs -0 -n1 plantuml -tsvg -o rendered'

      - name: Commit rendered images
        uses: EndBug/add-and-commit@v9
        with:
          message: "chore: render PlantUML diagrams"
          add: "rendered/**"
          # optionally:
          # author_name: "github-actions[bot]"
          # author_email: "41898282+github-actions[bot]@users.noreply.github.com"
